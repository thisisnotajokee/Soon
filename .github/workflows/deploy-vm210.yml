name: deploy-vm210

on:
  workflow_run:
    workflows:
      - quality-gate
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vm210-main
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push') }}
    runs-on: [self-hosted, Linux, vm210]
    timeout-minutes: 20

    steps:
      - name: Deploy on VM210 (self-hosted)
        run: |
          set -euo pipefail

          cd /home/soonadmin/Soon

          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "[deploy] Aborting: production worktree has local changes" >&2
            git status --short
            exit 1
          fi

          git fetch origin --prune
          git checkout main
          git pull --ff-only origin main

          npm ci --silent

          sudo systemctl restart soon-api.service
          sudo systemctl is-active --quiet soon-api.service

          curl -fsS http://127.0.0.1:3100/health >/dev/null
          curl -fsS http://127.0.0.1:3100/ >/dev/null
