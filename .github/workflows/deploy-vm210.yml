name: deploy-vm210

on:
  workflow_run:
    workflows:
      - quality-gate
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vm210-main
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy on VM210 over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SOON_DEPLOY_HOST }}
          username: ${{ secrets.SOON_DEPLOY_USER }}
          key: ${{ secrets.SOON_DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail

            if [ -d /home/soonadmin/Soon ]; then
              cd /home/soonadmin/Soon
            else
              cd "$HOME/Soon"
            fi

            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "[deploy] Aborting: production worktree has local changes" >&2
              git status --short
              exit 1
            fi

            git fetch origin --prune
            git checkout main
            git pull --ff-only origin main

            npm ci --silent

            sudo systemctl restart soon-api.service
            sudo systemctl is-active --quiet soon-api.service

            curl -fsS http://127.0.0.1:3000/health >/dev/null
            curl -fsS http://127.0.0.1:3000/ >/dev/null
