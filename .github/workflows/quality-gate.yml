name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  monitoring-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate monitoring config
        run: npm run obs:monitoring:check

  memory:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gate (memory)
        run: make smoke

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soon
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d soon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SOON_DB_MODE: postgres
      SOON_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/soon
      SOON_DATABASE_SSL: '0'
      SOON_READ_MODEL_REFRESH_MODE: async
      SOON_DOCTOR_EXPECT_STORAGE: postgres
      SOON_DOCTOR_EXPECT_READ_MODEL_MODE: async
      SOON_SELF_HEAL_TRIAGE_WARN_AS_ERROR: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: Contract tests
        run: npm run test:contracts

      - name: Worker tests
        run: npm run test:workers

      - name: Web smoke (postgres path)
        run: npm run smoke:e2e

      - name: Doctor report (with running API)
        run: |
          set -euo pipefail
          make up
          trap 'make down' EXIT
          make doctor

      - name: Ensure self-heal triage artifact (postgres)
        if: always()
        run: |
          set -euo pipefail
          TRIAGE_PATH="ops/reports/doctor/self-heal-triage.json"
          if [ -s "$TRIAGE_PATH" ]; then
            echo "[CI] triage artifact present: $TRIAGE_PATH"
            exit 0
          fi

          echo "[CI] triage artifact missing after doctor; running fallback triage generation"
          make up
          trap 'make down' EXIT
          SOON_SELF_HEAL_TRIAGE_OUT="$TRIAGE_PATH" npm run -s ops:self-heal:requeue:triage

      - name: Validate self-heal triage artifact (postgres)
        if: always()
        run: npm run -s ops:self-heal:triage:validate -- ops/reports/doctor/self-heal-triage.json

      - name: Publish doctor summary (postgres)
        if: always()
        env:
          SOON_DOCTOR_SUMMARY_REQUIRE_TRIAGE: '1'
        run: |
          if [ -f ops/reports/doctor/latest.json ]; then
            npm run -s obs:doctor:summary -- ops/reports/doctor/latest.json ops/reports/doctor/self-heal-triage.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Soon Doctor Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Artifact missing: \`ops/reports/doctor/latest.json\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload doctor artifact (postgres)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: doctor-report-postgres-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ops/reports/doctor/latest.json
            ops/reports/doctor/self-heal-triage.json
          if-no-files-found: warn
