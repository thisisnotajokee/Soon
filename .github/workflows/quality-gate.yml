name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  monitoring-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate monitoring config (strict)
        env:
          SOON_MONITORING_STRICT_FORCE_DOCKER: '1'
        run: |
          set -euo pipefail
          npm run obs:monitoring:strict | tee /tmp/monitoring-strict.log
          grep -F "amtool via rendered-config" /tmp/monitoring-strict.log

  monitoring-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate monitoring config
        run: npm run obs:monitoring:check

  memory:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gate (memory)
        run: make smoke

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soon
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d soon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SOON_DB_MODE: postgres
      SOON_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/soon
      SOON_DATABASE_SSL: '0'
      SOON_READ_MODEL_REFRESH_MODE: async
      SOON_DOCTOR_EXPECT_STORAGE: postgres
      SOON_DOCTOR_EXPECT_READ_MODEL_MODE: async
      SOON_SELF_HEAL_TRIAGE_WARN_AS_ERROR: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: Contract tests
        run: npm run test:contracts

      - name: Worker tests
        run: npm run test:workers

      - name: Web smoke (postgres path)
        run: npm run smoke:e2e

      - name: Doctor report (with running API)
        run: |
          set -euo pipefail
          make up
          trap 'make down' EXIT
          make doctor

      - name: Runtime-state watchdog smoke (postgres)
        run: |
          set -euo pipefail
          mkdir -p ops/reports/doctor
          make up
          trap 'make down' EXIT
          SOON_SELF_HEAL_COOLDOWN_WARN_SEC=999999 SOON_SELF_HEAL_COOLDOWN_CRIT_SEC=999999 npm run -s ops:self-heal:runtime-state:check:json > ops/reports/doctor/self-heal-runtime-state-watchdog.json

      - name: Ensure self-heal triage artifact (postgres)
        if: always()
        run: |
          set -euo pipefail
          TRIAGE_PATH="ops/reports/doctor/self-heal-triage.json"
          if [ -s "$TRIAGE_PATH" ]; then
            echo "[CI] triage artifact present: $TRIAGE_PATH"
            exit 0
          fi

          echo "[CI] triage artifact missing after doctor; running fallback triage generation"
          make up
          trap 'make down' EXIT
          SOON_SELF_HEAL_TRIAGE_OUT="$TRIAGE_PATH" npm run -s ops:self-heal:requeue:triage

      - name: Validate self-heal triage artifact (postgres)
        if: always()
        run: npm run -s ops:self-heal:triage:validate -- ops/reports/doctor/self-heal-triage.json

      - name: Validate probe reset ops key secret (postgres)
        if: always()
        env:
          SOON_TOKEN_PROBE_RESET_OPS_KEY: ${{ secrets.SOON_TOKEN_PROBE_RESET_OPS_KEY }}
        run: |
          if [ -z "${SOON_TOKEN_PROBE_RESET_OPS_KEY:-}" ]; then
            echo "[CI] missing required secret: SOON_TOKEN_PROBE_RESET_OPS_KEY" >&2
            exit 1
          fi

      - name: Publish doctor summary (postgres)
        if: always()
        env:
          SOON_DOCTOR_SUMMARY_REQUIRE_TRIAGE: '1'
          SOON_TOKEN_PROBE_RESET_OPS_KEY: ${{ secrets.SOON_TOKEN_PROBE_RESET_OPS_KEY }}
        run: |
          if [ -f ops/reports/doctor/latest.json ]; then
            npm run -s obs:doctor:summary -- ops/reports/doctor/latest.json ops/reports/doctor/self-heal-triage.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Soon Doctor Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Artifact missing: \`ops/reports/doctor/latest.json\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish runtime-state watchdog summary (postgres)
        if: always()
        run: |
          set -euo pipefail
          WATCHDOG_PATH="ops/reports/doctor/self-heal-runtime-state-watchdog.json"
          echo "### Self-heal Runtime-state Watchdog" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$WATCHDOG_PATH" ]; then
            node -e "const fs=require('node:fs'); const p=process.argv[1]; const d=JSON.parse(fs.readFileSync(p,'utf8')); console.log('- Overall: `'\"'\"''+String(d.overall||'unknown')+'`'); console.log('- Key: `'\"'\"''+String(d.key||'unknown')+'`'); console.log('- Cooldown active: `'\"'\"''+(d.cooldownActive?'true':'false')+'`'); console.log('- Cooldown remaining sec: `'\"'\"''+String(d.cooldownRemainingSec??0)+'`');" "$WATCHDOG_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Artifact missing: \`$WATCHDOG_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Probe-reset preflight smoke (postgres, optional secret)
        if: always()
        env:
          SOON_TOKEN_PROBE_RESET_OPS_KEY: ${{ secrets.SOON_TOKEN_PROBE_RESET_OPS_KEY }}
        run: |
          set -euo pipefail
          PREFLIGHT_PATH="ops/reports/doctor/probe-reset-preflight.json"
          mkdir -p ops/reports/doctor

          if [ -z "${SOON_TOKEN_PROBE_RESET_OPS_KEY:-}" ]; then
            node -e "const fs=require('node:fs'); const p=process.argv[1]; const payload={checkedAt:new Date().toISOString(), overall:'SKIPPED', reason:'missing_secret', secretName:'SOON_TOKEN_PROBE_RESET_OPS_KEY', auth:{secretSource:'missing'}}; fs.writeFileSync(p, JSON.stringify(payload,null,2)+'\n');" "$PREFLIGHT_PATH"
            echo "[CI] probe-reset preflight skipped (missing secret SOON_TOKEN_PROBE_RESET_OPS_KEY)"
            exit 0
          fi

          make up
          trap 'make down' EXIT
          set +e
          export SOON_PROBE_RESET_OPS_KEY_SOURCE="canonical"
          SOON_PROBE_RESET_PREFLIGHT_OUT="$PREFLIGHT_PATH" npm run -s ops:probe-reset:preflight
          PREFLIGHT_EXIT=$?
          set -e
          if [ "$PREFLIGHT_EXIT" -ne 0 ]; then
            echo "[CI] probe-reset preflight returned non-zero exit ($PREFLIGHT_EXIT); continuing because this stage is optional"
          fi

      - name: Publish probe-reset preflight summary (postgres)
        if: always()
        run: |
          set -euo pipefail
          PREFLIGHT_PATH="ops/reports/doctor/probe-reset-preflight.json"
          echo "### Probe-reset Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$PREFLIGHT_PATH" ]; then
            node -e "const fs=require('node:fs'); const p=process.argv[1]; const d=JSON.parse(fs.readFileSync(p,'utf8')); console.log('- Overall: `'\"'\"''+String(d.overall||'unknown')+'`'); if (d.reason) console.log('- Reason: `'\"'\"''+String(d.reason)+'`'); if (d.baseUrl) console.log('- Base URL: `'\"'\"''+String(d.baseUrl)+'`'); if (d.status?.auth) console.log('- Guard active in runtime: `'\"'\"''+(d.status.auth.opsKeyRequired?'true':'false')+'`'); if (d.auth?.localOpsKeyConfigured!==undefined) console.log('- Local ops key configured: `'\"'\"''+(d.auth.localOpsKeyConfigured?'true':'false')+'`'); if (d.auth?.secretSource) console.log('- Secret source: `'\"'\"''+String(d.auth.secretSource)+'`'); if (d.auth?.sanity) console.log('- Auth sanity ok: `'\"'\"''+(d.auth.sanity.ok?'true':'false')+'`'); console.log('- Findings: `'\"'\"''+String((d.findings||[]).length)+'`');" "$PREFLIGHT_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Artifact missing: \`$PREFLIGHT_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload doctor artifact (postgres)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: doctor-report-postgres-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ops/reports/doctor/latest.json
            ops/reports/doctor/self-heal-triage.json
            ops/reports/doctor/self-heal-runtime-state-watchdog.json
            ops/reports/doctor/probe-reset-preflight.json
          if-no-files-found: warn
