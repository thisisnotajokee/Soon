name: runtime-state-watchdog

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

jobs:
  watchdog:
    if: ${{ vars.SOON_RUNTIME_WATCHDOG_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOON_ALERT_BASE_URL: ${{ secrets.SOON_RUNTIME_BASE_URL }}
      SOON_RUNTIME_BEARER_TOKEN: ${{ secrets.SOON_RUNTIME_BEARER_TOKEN }}
      SOON_RUNTIME_API_KEY: ${{ secrets.SOON_RUNTIME_API_KEY }}
      SOON_TOKEN_PROBE_RESET_OPS_KEY: ${{ secrets.SOON_TOKEN_PROBE_RESET_OPS_KEY }}
      SOON_RUNTIME_PROBE_RESET_OPS_KEY_LEGACY: ${{ secrets.SOON_RUNTIME_PROBE_RESET_OPS_KEY }}
      SOON_SELF_HEAL_COOLDOWN_WARN_SEC: ${{ vars.SOON_SELF_HEAL_COOLDOWN_WARN_SEC || '1800' }}
      SOON_SELF_HEAL_COOLDOWN_CRIT_SEC: ${{ vars.SOON_SELF_HEAL_COOLDOWN_CRIT_SEC || '7200' }}
      SOON_PROBE_RESET_PREFLIGHT_REQUIRE_GUARD: ${{ vars.SOON_PROBE_RESET_PREFLIGHT_REQUIRE_GUARD || '0' }}
      SOON_PROBE_RESET_PREFLIGHT_WARN_AS_ERROR: ${{ vars.SOON_PROBE_RESET_PREFLIGHT_WARN_AS_ERROR || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required base URL secret
        run: |
          set -euo pipefail
          if [ -z "${SOON_ALERT_BASE_URL:-}" ]; then
            echo "[watchdog] missing secret SOON_RUNTIME_BASE_URL" >&2
            exit 2
          fi

      - name: Run runtime-state watchdog
        run: |
          set -euo pipefail
          mkdir -p ops/reports/doctor
          npm run -s ops:self-heal:runtime-state:check:json > ops/reports/doctor/runtime-state-watchdog.json

      - name: Run probe-reset preflight watchdog
        run: |
          set -euo pipefail
          mkdir -p ops/reports/doctor
          PROBE_RESET_SECRET_SOURCE="missing"
          if [ -z "${SOON_TOKEN_PROBE_RESET_OPS_KEY:-}" ] && [ -n "${SOON_RUNTIME_PROBE_RESET_OPS_KEY_LEGACY:-}" ]; then
            echo "[watchdog] using legacy fallback secret SOON_RUNTIME_PROBE_RESET_OPS_KEY (migrate to SOON_TOKEN_PROBE_RESET_OPS_KEY)"
            export SOON_TOKEN_PROBE_RESET_OPS_KEY="$SOON_RUNTIME_PROBE_RESET_OPS_KEY_LEGACY"
            PROBE_RESET_SECRET_SOURCE="legacy_fallback"
          elif [ -n "${SOON_TOKEN_PROBE_RESET_OPS_KEY:-}" ]; then
            PROBE_RESET_SECRET_SOURCE="canonical"
          fi
          export SOON_PROBE_RESET_OPS_KEY_SOURCE="$PROBE_RESET_SECRET_SOURCE"
          npm run -s ops:probe-reset:preflight:json -- --out ops/reports/doctor/probe-reset-preflight.json

      - name: Publish watchdog summary
        if: always()
        run: |
          set -euo pipefail
          REPORT_PATH="ops/reports/doctor/runtime-state-watchdog.json"
          PREFLIGHT_PATH="ops/reports/doctor/probe-reset-preflight.json"
          echo "## Runtime-state Watchdog" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$REPORT_PATH" ]; then
            node -e "const fs=require('node:fs'); const p=process.argv[1]; const d=JSON.parse(fs.readFileSync(p,'utf8')); console.log('- Overall: `'\"'\"''+String(d.overall||'unknown')+'`'); console.log('- Base URL: `'\"'\"''+String(d.baseUrl||'unknown')+'`'); console.log('- Key: `'\"'\"''+String(d.key||'unknown')+'`'); console.log('- Cooldown active: `'\"'\"''+(d.cooldownActive?'true':'false')+'`'); console.log('- Cooldown remaining sec: `'\"'\"''+String(d.cooldownRemainingSec??0)+'`'); console.log('- Findings: `'\"'\"''+String((d.findings||[]).length)+'`');" "$REPORT_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Artifact missing: \`$REPORT_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Probe-reset Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$PREFLIGHT_PATH" ]; then
            node -e "const fs=require('node:fs'); const p=process.argv[1]; const d=JSON.parse(fs.readFileSync(p,'utf8')); console.log('- Overall: `'\"'\"''+String(d.overall||'unknown')+'`'); console.log('- Base URL: `'\"'\"''+String(d.baseUrl||'unknown')+'`'); console.log('- Guard required policy: `'\"'\"''+(d.policy?.requireGuard?'true':'false')+'`'); console.log('- Guard active in runtime: `'\"'\"''+(d.status?.auth?.opsKeyRequired?'true':'false')+'`'); console.log('- Local ops key configured: `'\"'\"''+(d.auth?.localOpsKeyConfigured?'true':'false')+'`'); console.log('- Secret source: `'\"'\"''+String(d.auth?.secretSource||'unknown')+'`'); console.log('- Auth sanity ok: `'\"'\"''+(d.auth?.sanity?.ok?'true':'false')+'`'); console.log('- Findings: `'\"'\"''+String((d.findings||[]).length)+'`');" "$PREFLIGHT_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Artifact missing: \`$PREFLIGHT_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload watchdog artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-state-watchdog-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ops/reports/doctor/runtime-state-watchdog.json
            ops/reports/doctor/probe-reset-preflight.json
          if-no-files-found: warn

  watchdog-disabled:
    if: ${{ vars.SOON_RUNTIME_WATCHDOG_ENABLED != '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Runtime-state watchdog is disabled
        run: |
          set -euo pipefail
          echo "## Runtime-state Watchdog" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: \`disabled\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- To enable: set repository variable \`SOON_RUNTIME_WATCHDOG_ENABLED=1\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Probe-reset Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: \`disabled\`" >> "$GITHUB_STEP_SUMMARY"
