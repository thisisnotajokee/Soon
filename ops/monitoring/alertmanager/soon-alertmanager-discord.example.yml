global:
  resolve_timeout: 5m

route:
  receiver: discord-ops
  group_by: ['alertname', 'team']
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 2h
  routes:
    - matchers:
        - channel="discord-ops"
      receiver: discord-ops
      continue: false

receivers:
  - name: discord-ops
    discord_configs:
      - webhook_url: "https://example.com/soon-discord-webhook"
        title: "[Soon][{{ .CommonLabels.severity | toUpper }}] {{ .CommonLabels.alertname }}"
        message: >-
          {{ range .Alerts -}}
          {{ .Annotations.summary }}\n{{ .Annotations.description }}\nlabels={{ .Labels }}\n---\n
          {{ end -}}
        send_resolved: true
